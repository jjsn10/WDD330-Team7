<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <h2>Review & Place your Order</h2>
      <section class="checkout-form">
        <form name="checkout-form" id="checkout-form">
          <fieldset>
            <legend>Shipping</legend>
            <div class="form-group" id="name-group">
              <label for="fname">First Name</label>
              <input type="text" id="fname" name="fname" required />
            </div>
            <div class="form-group" id="name-group">
              <label for="lname">Last Name</label>
              <input type="text" id="lname" name="lname" required />
            </div>
            <div class="form-group" id="name-group">
              <label for="street">Street</label>
              <input type="text" id="street" name="street" required />
            </div>
            <div class="form-group" id="name-group">
              <label for="city">City</label>
              <input type="text" id="city" name="city" required />
            </div>
            <div class="form-group" id="name-group">
              <label for="state">State</label>
              <input
                type="text"
                id="state"
                name="state"
                required
                minlength="2"
                maxlength="2"
                pattern="[A-Za-z]{2}"
                title="2-letter state abbreviation (e.g. UT)"
              />
            </div>
            <div class="form-group" id="name-group">
              <label for="zip">Zip Code</label>
              <input
                type="text"
                id="zip"
                name="zip"
                required
                pattern="[0-9]{5}"
                title="5-digit zip code"
                inputmode="numeric"
              />
            </div>
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <div class="form-group" id="name-group">
              <label for="cardNumber">Card number</label>
              <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                required
                pattern="[0-9]{16}"
                maxlength="16"
                title="16-digit card number"
                inputmode="numeric"
              />
            </div>
            <div class="form-group" id="name-group">
              <label for="expiration">Expiration</label>
              <input
                type="text"
                id="expiration"
                name="expiration"
                required
                pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                placeholder="MM/YY"
                title="Expiration date in MM/YY format"
              />
            </div>
            <div class="form-group" id="name-group">
              <label for="code">Security Code</label>
              <input
                type="text"
                id="code"
                name="code"
                required
                pattern="[0-9]{3,4}"
                minlength="3"
                maxlength="4"
                title="3 or 4 digit security code"
                inputmode="numeric"
              />
            </div>
          </fieldset>
          <fieldset>
            <legend>Order Summary</legend>
            <div id="order-summary" class="order-summary">
              <ul>
                <li>
                  <label for="item-subtotal"
                    >Item Subtotal(<span id="num-items"></span>)</label
                  >
                  <p id="item-subtotal"></p>
                </li>
                <li>
                  <label for="shipping">Shipping</label>
                  <p id="shipping">$0.00</p>
                </li>
                <li>
                  <label for="tax">Tax</label>
                  <p id="tax">$0.00</p>
                </li>
                <li>
                  <label for="orderTotal">Order Total</label>
                  <p id="orderTotal">$0.00</p>
                </li>
              </ul>
            </div>
          </fieldset>
          <p id="checkout-message"></p>
          <button type="submit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
