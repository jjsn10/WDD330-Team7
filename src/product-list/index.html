<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="../js/product-list.js" defer></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>
    <nav id="breadcrumb" class="breadcrumb"></nav>
    <main class="divider">
      <section class="products">
        <h2>Top Products</h2>
        <ul class="product-list" id="product-list"></ul>
      </section>
    </main>
    <footer id="main-footer"></footer>
    <div id="quick-view-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="qv-product-name">
      <div class="modal qv-modal">
        <button id="qv-modal-close" class="modal-close" aria-label="Close">&times;</button>
        <div id="qv-modal-content"></div>
      </div>
    </div>
  </body>
</html>
